<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - Pro Edition</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #1a1a1a;
      color: white;
    }

    h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
      background-color: #333;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .cell {
      background-color: #2d2d2d;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .cell:hover { background-color: #444; }
    
    /* Colors for Players */
    .cell.x { color: #3498db; }
    .cell.o { color: #e74c3c; }
    
    /* Win Highlight */
    .cell.winner {
      background-color: #27ae60;
      color: white;
      transform: scale(1.05);
    }

    .cell.disabled { pointer-events: none; }

    #status {
      margin-top: 30px;
      font-size: 1.5rem;
      height: 2rem;
    }

    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover { background-color: #2980b9; }
  </style>
</head>
<body>

  <h1>TIC TAC TOE</h1>
  <div class="board" id="board"></div>
  <div id="status">Player X's turn</div>
  <button onclick="resetGame()">Reset Game</button>

  <script>
    const board = document.getElementById('board');
    const statusText = document.getElementById('status');
    let currentPlayer = 'X';
    let gameActive = true;
    let cells = [];

    const winConditions = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    function createBoard() {
      board.innerHTML = '';
      cells = [];
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.dataset.index = i;
        cell.addEventListener('click', handleCellClick);
        board.appendChild(cell);
        cells.push(cell);
      }
    }

    function handleCellClick(e) {
      const cell = e.target;
      if (!gameActive || cell.textContent !== '') return;

      cell.textContent = currentPlayer;
      cell.classList.add(currentPlayer.toLowerCase());
      cell.classList.add('disabled');

      const winCombo = getWinCombo();
      if (winCombo) {
        statusText.textContent = `🎉 Player ${currentPlayer} Wins!`;
        winCombo.forEach(index => cells[index].classList.add('winner'));
        gameActive = false;
        return;
      }

      if (cells.every(c => c.textContent !== '')) {
        statusText.textContent = "🤝 It's a Draw!";
        gameActive = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusText.textContent = `Player ${currentPlayer}'s turn`;
    }

    function getWinCombo() {
      for (let condition of winConditions) {
        const [a, b, c] = condition;
        if (cells[a].textContent && 
            cells[a].textContent === cells[b].textContent && 
            cells[a].textContent === cells[c].textContent) {
          return condition;
        }
      }
      return null;
    }

    function resetGame() {
      currentPlayer = 'X';
      gameActive = true;
      statusText.textContent = `Player ${currentPlayer}'s turn`;
      createBoard();
    }

    createBoard();
  </script>
</body>
</html>
